<html lang="en">

  <meta charset="UTF-8" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-lightest: #f4fbf4;
      --green-light: #eef7ee;
      --green-mid: #c0ddc0;
      --green-border: #b5d4b5;
      --green-muted: #8ab89a;
      --green-main: #4a7c5a;
      --green-dark: #2e5e3e;
      --text-primary: #1a2e1f;
      --text-secondary: #4a5c4e;
      --text-muted: #7a8c7e;
      --bg: #f9fdf9;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(74, 124, 90, 0.05);
      --shadow-md: 0 8px 24px rgba(74, 124, 90, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* HERO SECTION */
    .hero {
      padding: 5rem 0 3.5rem;
      border-bottom: 0.5px solid var(--green-border);
      display: flex;
      align-items: center;
      gap: 3rem;
    }
    .hero-left { flex: 1; min-width: 0; }
    .hero-photo {
      width: 180px;
      height: 240px;
      object-fit: cover;
      object-position: center top;
      border-radius: 16px;
      flex-shrink: 0;
      border: 2px solid var(--green-border);
      box-shadow: var(--shadow-md);
    }
    .hero-greeting {
      font-family: 'Lora', serif;
      font-size: 42px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .hero-name-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--green-main);
      font-weight: 400;
      margin-bottom: 1.5rem;
    }
    .hero-slogan {
      font-size: 16px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }
    .hero-slogan-en {
      font-size: 14px;
      color: var(--green-muted);
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    .hero-tagline {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .hero-contacts { display: flex; flex-wrap: wrap; gap: 10px; }
    .contact-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--green-dark);
      background: var(--white);
      border: 1px solid var(--green-border);
      border-radius: 20px;
      padding: 6px 16px;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .contact-pill:hover {
      background: var(--green-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .contact-pill.primary-btn {
      background: var(--green-main);
      color: var(--white);
      border-color: var(--green-main);
    }
    .contact-pill.primary-btn:hover {
      background: var(--green-dark);
    }
