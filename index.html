<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jennifer Fu · Portfolio & AI Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-lightest: #f4fbf4;
      --green-light: #eef7ee;
      --green-mid: #c0ddc0;
      --green-border: #b5d4b5;
      --green-muted: #8ab89a;
      --green-main: #4a7c5a;
      --green-dark: #2e5e3e;
      --text-primary: #1a2e1f;
      --text-secondary: #4a5c4e;
      --text-muted: #7a8c7e;
      --bg: #f9fdf9;
      --white: #ffffff;
      --accent: #e67e22;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* HERO SECTION */
    .hero {
      padding: 4.5rem 0 3rem;
      border-bottom: 0.5px solid var(--green-border);
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }
    .hero-left { flex: 1; min-width: 0; }
    .hero-photo {
      width: 180px;
      height: 240px;
      object-fit: cover;
      object-position: center top;
      border-radius: 12px;
      flex-shrink: 0;
      border: 2px solid var(--green-border);
      box-shadow: 0 4px 12px rgba(74, 124, 90, 0.1);
    }
    .hero-greeting {
      font-family: 'Lora', serif;
      font-size: 38px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .hero-name-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--green-main);
      margin-bottom: 1.2rem;
    }
    .hero-tagline {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 1.8rem;
    }
    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
      background: var(--green-main);
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(74, 124, 90, 0.2);
    }
    .btn-primary:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
    }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--green-dark);
      background: var(--green-light);
      border: 0.5px solid var(--green-border);
      border-radius: 20px;
      padding: 8px 18px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--green-mid); }

    .hero-contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 1rem;
      border-top: 0.5px dashed var(--green-border);
      padding-top: 1rem;
    }
    .contact-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    .contact-pill i { color: var(--green-main); }

    /* SECTIONS */
    .section {
      padding: 3rem 0;
      border-bottom: 0.5px solid var(--green-border);
    }
    .section:last-of-type { border-bottom: none; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .section-label-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green-main);
      font-weight: 600;
      white-space: nowrap;
    }
    .section-label-line {
      flex: 1;
      height: 0.5px;
      background: var(--green-border);
    }

    /* FEATURED PROJECT &复盘 COLLABORATION */
    .project-showcase {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    @media (min-width: 768px) {
      .project-showcase { grid-template-columns: 1.1fr 0.9fr; }
    }

    /* Project Specs/Case Study */
    .project-specs { display: flex; flex-direction: column; gap: 1.5rem; }
    .spec-block h3 {
      font-size: 15px;
      color: var(--green-dark);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spec-block p, .spec-block li {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .spec-block ul { list-style: none; padding-left: 4px; }
    .spec-block li { position: relative; padding-left: 14px; margin-bottom: 4px; }
    .spec-block li::before {
      content: "•"; color: var(--green-muted); position: absolute; left: 0; font-weight: bold;
    }

    /* Live App Sandbox UI */
    .app-sandbox {
      background: var(--white);
      border: 1px solid var(--green-border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(74, 124, 90, 0.05);
    }
    .sandbox-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      font-size: 12px;
    }
    .dots { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }
    .status-tag { color: var(--green-main); font-weight: 500; font-family: monospace; }

    .textarea-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      display: block;
    }
    .jd-input {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid var(--green-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
      background: var(--green-lightest);
      transition: border-color 0.2s;
    }
    .jd-input:focus { border-color: var(--green-main); box-shadow: 0 0 0 2px var(--green-light); }
    
    .match-btn {
      width: 100%;
      background: var(--green-main);
      color: var(--white);
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .match-btn:hover { background: var(--green-dark); }

    /* Match Result Styles (From your original code) */
    .dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .str-gap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .str-box { background: #f4faf6; border: 1px solid #d5ecd9; border-radius: 8px; padding: 10px; }
    .gap-box { background: #fffcf5; border: 1px solid #fbeed2; border-radius: 8px; padding: 10px; }
    .str-title { font-size: 12px; font-weight: 600; color: #2e5e3e; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .gap-title { font-size: 12px; font-weight: 600; color: #b07200; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .str-ul, .gap-ul { list-style: none; font-size: 12px; color: var(--text-secondary); padding-left: 2px; }
    .str-li::before { content: "✓ "; color: #2e5e3e; font-weight: bold; }
    .gap-li::before { content: "⚠ "; color: #b07200; font-weight: bold; }
    .dim-bar-fill { height: 100%; background: var(--green-main); border-radius: 2px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    /* WORKFLOW & WORLD */
    .workflow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .workflow-card {
      background: var(--green-lightest);
      border: 0.5px solid var(--green-border);
      border-radius: 12px;
      padding: 1.2rem;
    }
    .workflow-card h4 { font-size: 14px; color: var(--green-dark); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px;}
    .workflow-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    .skills-flex { display: flex; flex-wrap: wrap; gap: 8px; }
    .tool-chip {
      font-size: 12.5px;
      color: var(--green-dark);
      background: var(--white);
      border: 0.5px solid var(--green-border);
      border-radius: 6px;
      padding: 6px 12px;
    }

    footer { text-align: center; padding: 3rem 0; font-size: 12px; color: var(--green-muted); letter-spacing: 0.06em; }

    @media (max-width: 600px) {
      .hero { flex-direction: column-reverse; gap: 1.5rem; padding: 2.5rem 0; }
      .hero-photo { width: 120px; height: 120px; border-radius: 50%; object-position: center; }
      .hero-greeting { font-size: 30px; text-align: center; }
      .hero-name-sub { text-align: center; }
      .hero-cta-group { justify-content: center; }
      .dim-grid { grid-template-columns: 1fr; }
      .str-gap-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
